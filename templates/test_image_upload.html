<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test direct image upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 16px;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .error {
            background: #ffe8e8;
            color: #900;
            border: 1px solid #f0b7b7;
        }
        .result {
            background: #f8f8f8;
        }
        img.preview {
            max-width: 100%;
            margin-top: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #111;
            color: white;
            cursor: pointer;
        }
        button:disabled {
            background: #999;
            cursor: default;
        }
    </style>
</head>
<body>
    <h1>Test direct image upload</h1>
    <p>Request a presigned URL from Django, then upload the file directly to Yandex Object Storage.</p>

    <div class="card">
        <input type="file" id="fileInput">
        <div style="margin-top: 16px;">
            <button id="uploadBtn">Upload directly to Yandex</button>
        </div>
    </div>

    <div id="errorBox" class="card error" style="display:none;"></div>
    <div id="resultBox" class="card result" style="display:none;"></div>

    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        const fileInput = document.getElementById("fileInput");
        const uploadBtn = document.getElementById("uploadBtn");
        const errorBox = document.getElementById("errorBox");
        const resultBox = document.getElementById("resultBox");

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = "block";
        }

        function hideMessages() {
            errorBox.style.display = "none";
            resultBox.style.display = "none";
            errorBox.innerHTML = "";
            resultBox.innerHTML = "";
        }

        uploadBtn.addEventListener("click", async () => {
            hideMessages();

            const file = fileInput.files[0];
            if (!file) {
                showError("Please choose a file first.");
                return;
            }

            uploadBtn.disabled = true;
            uploadBtn.textContent = "Uploading...";

            try {
                const formData = new FormData();
                formData.append("filename", file.name);
                formData.append("content_type", file.type || "application/octet-stream");

                const presignResponse = await fetch("/api/test-image-upload/presign", {
                    method: "POST",
                    body: formData,
                    headers: {
                        "X-CSRFToken": getCookie("csrftoken"),
                    },
                    credentials: "same-origin",
                });

                const presignData = await presignResponse.json();

                if (!presignResponse.ok) {
                    throw new Error(presignData.details || presignData.error || "Presign failed");
                }

                const uploadResponse = await fetch(presignData.upload_url, {
                    method: "PUT",
                    headers: {
                        "Content-Type": presignData.content_type,
                    },
                    body: file,
                });

                if (!uploadResponse.ok) {
                    const text = await uploadResponse.text();
                    throw new Error(`Direct upload failed: HTTP ${uploadResponse.status}: ${text.slice(0, 300)}`);
                }

                let html = `
                    <p><b>Name:</b> ${file.name}</p>
                    <p><b>Size:</b> ${file.size} bytes</p>
                    <p><b>Content-Type:</b> ${presignData.content_type}</p>
                    <p><b>Object key:</b> ${presignData.object_key}</p>
                    <p><b>Public URL:</b> <a href="${presignData.public_url}" target="_blank" rel="noopener noreferrer">${presignData.public_url}</a></p>
                `;

                if ((presignData.content_type || "").startsWith("image/")) {
                    html += `<img class="preview" src="${presignData.public_url}" alt="Uploaded image preview">`;
                }

                resultBox.innerHTML = html;
                resultBox.style.display = "block";
            } catch (err) {
                showError(err.message || "Unknown error");
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = "Upload directly to Yandex";
            }
        });
    </script>
</body>
</html>
